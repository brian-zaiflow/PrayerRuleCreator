# Docker Compose configuration for production deployment
# "Create and Print Only" mode - No database required
#
# Usage: docker compose -f docker-compose.production.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prayer-rule-app
    environment:
      # Document persistence disabled - "create and print only" mode
      ENABLE_DOCUMENT_PERSISTENCE: "false"
      VITE_ENABLE_DOCUMENT_PERSISTENCE: "false"

      PORT: 5000
      NODE_ENV: production
    ports:
      - "3000:5000"
    restart: unless-stopped
