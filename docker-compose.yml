# Docker Compose configuration for Prayer Rule Creator
#
# This configuration includes both the application and PostgreSQL database.
# By default, document persistence is ENABLED (save/load/delete features).
#
# To run in "create and print only" mode (no database):
# 1. Set ENABLE_DOCUMENT_PERSISTENCE=false and VITE_ENABLE_DOCUMENT_PERSISTENCE=false
# 2. Comment out the postgres service and depends_on section
# 3. Remove or comment out DATABASE_URL

services:
  postgres:
    image: postgres:16-alpine
    container_name: prayer-rule-db
    environment:
      POSTGRES_USER: prayerrule
      POSTGRES_PASSWORD: prayerrule_dev_password
      POSTGRES_DB: prayerrule
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prayerrule"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prayer-rule-app
    environment:
      # Feature flag: Document persistence
      # Set to 'true' to enable save/load/delete features (requires database)
      # Set to 'false' for "create and print only" mode (no database needed)
      ENABLE_DOCUMENT_PERSISTENCE: "true"
      VITE_ENABLE_DOCUMENT_PERSISTENCE: "true"

      # Database connection (only required when persistence is enabled)
      DATABASE_URL: postgresql://prayerrule:prayerrule_dev_password@postgres:5432/prayerrule

      PORT: 5000
      NODE_ENV: production
    ports:
      - "3000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
